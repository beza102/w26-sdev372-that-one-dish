name: Deploy That One Dish

on:
  workflow_run:
    workflows: ["Run Tests"] # Ensure your teammate's test file has 'name: Tests' at the top
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Install Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:deploy

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Navigate to the That One Dish directory
            cd ${{ secrets.THAT_ONE_DISH_PATH }}
            
            # Pull the latest code
            git pull origin main
            
            # Rebuild and restart the backend and frontend containers
            docker compose up --build -d
            
            # Clean up old, unused images to save disk space
            docker image prune -f